spring.application.name=bot-exchange
bot.name=${BOT_NAME}
bot.token=${BOT_TOKEN}
cbr.currency.rates.xml.url=http://www.cbr.ru/scripts/XML_daily.asp
bank.currency.rates.jsoup.url=https://finance.rambler.ru/currencies/exchange/
crypto.currency.rates.jsoup.url=https://bitinfocharts.com/ru/spisok-luchshih-kriptovalyut.html
id.owner=${ID_OWNER}

# Flyway
spring.flyway.enabled=true 
spring.flyway.locations=classpath:db/migration

# Data
spring.datasource.url=jdbc:mysql://mysqldb:3306/telegrambots
spring.datasource.username=root
spring.datasource.password=${MYSQL_USER_PASSWORD}

# Datasource connection
spring.datasource.platform=mysql
#spring.datasource.initialization-mode=always
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.format_sql=true

# Scheduler
cron_txt.scheduler=0 00 23 * * ?
